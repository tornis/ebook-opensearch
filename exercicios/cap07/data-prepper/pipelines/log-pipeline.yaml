# Pipeline Básico: HTTP Source → Mutate → OpenSearch Sink
# Descrição: Receber logs JSON via HTTP e armazenar no OpenSearch
# Endpoint: POST http://localhost:21000/log/ingest
# Formato: Array JSON de eventos

log-ingestion-pipeline:
  # ========== SOURCE: Receber logs via HTTP ==========
  source:
    http:
      # Porta de escuta
      port: 21000

      # Caminho da API
      path: "/log/ingest"

  # ========== PROCESSOR: Enriquecer eventos ==========
  processor:
    # Processador Mutate: Adicionar e renomear campos
    - mutate:
        # Adicionar timestamp de ingestão (se não existir)
        add_entries:
          - key: "ingest_timestamp"
            value: "${now()}"  # Timestamp em milissegundos

          - key: "ingest_hostname"
            value: "data-prepper"

          - key: "pipeline_name"
            value: "log-ingestion"

        # Renomear campos se necessário
        # rename_keys:
        #   "msg": "message"
        #   "sev": "severity"

        # Converter tipos de dados
        convert:
          timestamp: "long"

  # ========== SINK: Armazenar no OpenSearch ==========
  sink:
    - opensearch:
        # Endpoints do cluster OpenSearch
        hosts: ["https://opensearch:9200"]

        # Autenticação básica
        username: "admin"
        password: "admin"

        # Modo inseguro: desabilita validação SSL (APENAS DEV!)
        insecure: true

        # Índice de destino com padrão de data
        # Cria: logs-app-2025.01.15
        index: "logs-app-%{yyyy.MM.dd}"

        # Tipo de documento
        document_type: "_doc"

        # Buffer de bulk para performance
        bulk_size: 500

        # Flush automático a cada X segundos
        flush_interval: 30

        # Número de tentativas de reconexão
        max_retries: 3

        # Tempo entre tentativas (milissegundos)
        retry_delay: 1000
