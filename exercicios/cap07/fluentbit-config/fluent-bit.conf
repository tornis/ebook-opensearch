[SERVICE]
    Flush         5
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf

# INPUT: Tail dos logs Apache2
[INPUT]
    Name              tail
    Path              /var/log/apache2/access.log
    Parser            apache2
    Tag               apache.*
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# FILTER: Adicionar campos de contexto
[FILTER]
    Name    modify
    Match   apache.*
    Add     service_name apache-web-server
    Add     environment production
    Add     log_source container

# OUTPUT: Enviar para Data Prepper via HTTP
[OUTPUT]
    Name   http
    Match  apache.*
    Host   data-prepper
    Port   21001
    URI    /apache/logs
    Format json_lines
    Header User-Agent Fluent-Bit-Apache
    Header X-Source apache-fluentbit
    json_date_key timestamp
    json_date_format iso8601
