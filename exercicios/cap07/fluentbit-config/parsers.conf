# Parsers de Apache2
# Formatos suportados:
# - Apache Common Log Format
# - Apache Combined Log Format

[PARSER]
    Name         apache2
    Format       regex
    Regex        ^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S+)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")?$
    Time_Key     time
    Time_Format  %d/%b/%Y:%H:%M:%S %z
    Time_Keep    On

[PARSER]
    Name         apache_error
    Format       regex
    Regex        ^\[(?<time>[^\]]+)\] \[(?<level>[^\]]+)\]( \[pid (?<pid>[^\]]+)\])?( \[client (?<client>[^\]]+)\])? (?<message>.*)$
    Time_Key     time
    Time_Format  %a %b %d %H:%M:%S.%L %Y
    Time_Keep    On

# Parser JSON (fallback)
[PARSER]
    Name         json
    Format       json
    Time_Key     timestamp
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

# Parser Docker (para logs containerizados)
[PARSER]
    Name         docker
    Format       json
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep    On
