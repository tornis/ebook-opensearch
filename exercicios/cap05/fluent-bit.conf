[SERVICE]
    # Configuração global do Fluent Bit
    Flush                    5
    Daemon                   off
    Log_Level               debug
    Parsers_File            parsers.conf
    Plugins_File            plugins.conf
    HTTP_Server             on
    HTTP_Listen             0.0.0.0
    HTTP_Port               2020

    storage.path            	/tmp/fluentbit-buffer
    storage.sync            	normal
    storage.checksum        	off
    storage.backlog.mem_limit   50MB


###############################################################################
# INPUT: Ler logs do arquivo Apache
###############################################################################
[INPUT]
    Name                    tail
    Path                    /tmp/apache_logs_prepared.log
    Parser                  apache2
    Tag                     apache.access
    Read_from_Head          true
    Refresh_Interval        5
    Mem_Buf_Limit           50MB
    Skip_Long_Lines         on

###############################################################################
# FILTER 1: Parser - Estruturar logs Apache
###############################################################################
[FILTER]
    Name                    parser
    Match                   apache.access
    Key_Name                log
    Parser                  apache2
    Preserve_Key            on
    Reserve_Data            on

###############################################################################
# FILTER 2: Remover requisições de recursos estáticos
# Remove: imagens (png, jpg, jpeg, gif, svg), CSS, ícones, fontes
###############################################################################
[FILTER]
    Name                    grep
    Match                   apache.access
    Exclude                 request ^.*(\.png|\.jpg|\.jpeg|\.gif|\.svg|\.ico|\.css|\.ttf|\.woff|\.woff2)(\s|$)

###############################################################################
# FILTER 3: Sampling - Implementar política de captura seletiva
# - 10% de requisições com HTTP 200
# - 100% de HTTP 400, 500
###############################################################################
[FILTER]
    Name                    lua
    Match                   apache.access
    Script                  sampling.lua
    Call                    apply_sampling

###############################################################################
# FILTER 4: Adicionar informações de ingestão (timestamp, índice)
###############################################################################
[FILTER]
    Name    lua
    Match   apache.access
    script  current_time.lua
    call    add_ingest_timestamp

[FILTER]
    Name    modify
    Match   apache.access
    Add     source apache-webserver

###############################################################################
# OUTPUT: Enviar para OpenSearch
# Índices seguem padrão Logstash: logstash-YYYY.MM.DD
###############################################################################
[OUTPUT]
    Name                    opensearch
    Match                   apache.access
    Host                    192.168.1.200
    Port                    9200
    HTTP_User               admin
    HTTP_Passwd             Admin#123456
    TLS                	    On
    TLS.Verify         	    Off
    TLS.Debug               0
    
    Suppress_Type_Name      On
    Index                   logstash-apache
    Type                    _doc
    Logstash_Format         on
    Logstash_Prefix         logstash-apache
    Time_Key                @timestamp

    # Configurações de performance
    net.keepalive           on
    net.keepalive_max_recycle  2000

