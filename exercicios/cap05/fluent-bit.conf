[SERVICE]
    # Configuração global do Fluent Bit
    Flush                    5
    Daemon                   off
    Log_Level               info
    Parsers_File            parsers.conf
    Plugins_File            plugins.conf
    HTTP_Server             on
    HTTP_Listen             0.0.0.0
    HTTP_Port               2020

###############################################################################
# INPUT: Ler logs do arquivo Apache
###############################################################################
[INPUT]
    Name                    tail
    Path                    /mnt/projetos/teste/ebook-opensearch/exercicios/cap05/apache_logs_prepared.log
    Parser                  apache2
    Tag                     apache.access
    Read_from_Head          true
    Refresh_Interval        5
    Mem_Buf_Limit           50MB
    Skip_Long_Lines         on

###############################################################################
# FILTER 1: Parser - Estruturar logs Apache
###############################################################################
[FILTER]
    Name                    parser
    Match                   apache.access
    Key_Name                log
    Parser                  apache2
    Preserve_Key            on
    Reserve_Data            on

###############################################################################
# FILTER 2: Remover requisições de recursos estáticos
# Remove: imagens (png, jpg, jpeg, gif, svg), CSS, ícones, fontes
###############################################################################
[FILTER]
    Name                    grep
    Match                   apache.access
    Exclude                 request ^.*(\.png|\.jpg|\.jpeg|\.gif|\.svg|\.ico|\.css|\.ttf|\.woff|\.woff2)(\s|$)

###############################################################################
# FILTER 3: Sampling - Implementar política de captura seletiva
# - 10% de requisições com HTTP 200
# - 100% de HTTP 400, 500
###############################################################################
[FILTER]
    Name                    lua
    Match                   apache.access
    Script                  sampling.lua
    Call                    apply_sampling

###############################################################################
# FILTER 4: Adicionar informações de ingestão (timestamp, índice)
###############################################################################
[FILTER]
    Name                    modify
    Match                   apache.access
    Add                     @timestamp ${TIMESTAMP}
    Add                     ingest_timestamp ${TIMESTAMP}
    Add                     source apache-webserver

###############################################################################
# OUTPUT: Enviar para OpenSearch
# Índices seguem padrão Logstash: logstash-YYYY.MM.DD
###############################################################################
[OUTPUT]
    Name                    opensearch
    Match                   apache.access
    Host                    localhost
    Port                    9200
    HTTP_User               admin
    HTTP_Passwd             <SENHA_ADMIN>
    TLS                     on
    TLS_Verify              off
    TLS.Debug               0

    # Configuração de índice com padrão Logstash
    Index                   logstash-apache-%Y.%m.%d
    Type                    _doc
    Logstash_Format         on
    Logstash_Prefix         logstash-apache
    Time_Key                @timestamp

    # Configurações de performance
    Retry_Limit             3
    net.keepalive           on
    net.keepalive_max_recycle  2000

    # Buffering
    storage.path            /tmp/fluentbit-buffer
    storage.sync            normal
    storage.checksum        off
    storage.backlog.mem_limit   50MB

###############################################################################
# OUTPUT: Salvar um backup em arquivo para referência
###############################################################################
[OUTPUT]
    Name                    file
    Match                   apache.access
    Path                    /tmp/fluentbit-output/apache_processed
    Format                  json_lines
